android.useAndroidX=true

# Le build a crashé avec une erreur OOM native (voir hs_err_pid...log).
# On réduit la mémoire Java et on limite le parallélisme pour rendre le build stable.
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
