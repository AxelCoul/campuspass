<div class="login-page">
  <div class="login-card card">
    <h1 class="login-title">PASS CAMPUS</h1>
    <p class="login-subtitle">Panneau administrateur</p>
    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="admin@passcampus.com" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>
      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Connexion' }}
      </button>
    </form>
    <p class="forgot-link"><a href="#">Mot de passe oublié ?</a></p>
  </div>
</div>
