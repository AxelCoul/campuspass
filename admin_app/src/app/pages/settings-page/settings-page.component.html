<h2>Paramètres</h2>
<p class="subtitle">Commission plateforme, durée des coupons, configuration email et notifications.</p>

@if (error) {
  <p class="error-msg">{{ error }}</p>
}
@if (success) {
  <p class="success-msg">{{ success }}</p>
}

<div class="card form-card">
  <h3>Plateforme</h3>
  <form (ngSubmit)="save()">
    <div class="form-group">
      <label for="commission">Taux de commission (%)</label>
      <input id="commission" type="number" [(ngModel)]="commissionRate" name="commission" min="0" max="100" step="0.5" />
    </div>
    <div class="form-group">
      <label for="couponDays">Durée de validité des coupons (jours)</label>
      <input id="couponDays" type="number" [(ngModel)]="couponValidityDays" name="couponDays" min="1" max="365" />
    </div>

    <h3>Email</h3>
    <div class="form-group">
      <label for="emailFrom">Email expéditeur</label>
      <input id="emailFrom" type="text" [(ngModel)]="emailFrom" name="emailFrom" placeholder="noreply@passcampus.com" />
    </div>
    <div class="form-group">
      <label for="emailHost">Serveur SMTP</label>
      <input id="emailHost" type="text" [(ngModel)]="emailHost" name="emailHost" placeholder="smtp.example.com" />
    </div>

    <h3>Notifications</h3>
    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" [(ngModel)]="autoNotifications" name="autoNotifications" />
        Notifications automatiques (rappels, offres)
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>
  </form>
</div>
