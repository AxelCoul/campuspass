spring.application.name=backend
# Render (et autres PaaS) injectent PORT ; en local, 8081 par défaut
server.port=${PORT:8081}

# Local : localhost. Sur Render : variable d'environnement DATABASE_URL (voir RenderDataSourceConfiguration).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/campuspass}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update

# JWT — production : définir JWT_SECRET sur Render (longue chaîne aléatoire, min. 32 caractères)
jwt.secret=${JWT_SECRET:CampusPassLocalDevOnly_DoNotUseInProduction_Min32Chars____}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS : motifs de base dans CorsConfig (localhost:*, https://*.vercel.app). Ici : origines/motifs supplémentaires (domaine perso, etc.)
app.cors.allowed-origins=

# Upload (stockage local)
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Yengapay — ne pas committer de clés ; utiliser les variables listées dans env.example
yengapay.api-key=${YENGAPAY_API_KEY:}
yengapay.site-id=${YENGAPAY_SITE_ID:}
yengapay.group-id=${YENGAPAY_GROUP_ID:}
yengapay.base-url=${YENGAPAY_BASE_URL:https://api.yengapay.com/api/v1}
yengapay.project-id=${YENGAPAY_PROJECT_ID:}
yengapay.paylink-url=${YENGAPAY_PAYLINK_URL:}
yengapay.notify-url=${YENGAPAY_NOTIFY_URL:}
yengapay.return-url=${YENGAPAY_RETURN_URL:}

# Feature flags
feature.merchant-offer-management.enabled=false
