spring.application.name=backend
# Render (et autres PaaS) injectent PORT ; en local, 8081 par défaut
server.port=${PORT:8081}

# Local : localhost. Sur Render : DATABASE_URL (voir DatabaseUrlEnvironmentPostProcessor) ou variables SPRING_DATASOURCE_*.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/campuspass}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
# Évite l'erreur Hibernate "Unable to determine Dialect" si la connexion JDBC n'est pas encore établie
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# JWT
jwt.secret=PassCampusSecretKey2026TresLongPourHS256Signature
jwt.expiration-ms=86400000

# Upload (stockage local)
app.upload.dir=uploads
# Limites multipart (éviter 413 Payload Too Large) — 10 Mo par fichier, 10 Mo par requête
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

